version: '3.8'

services:
  # Shared Infrastructure
  postgres:
    image: postgres:15-alpine
    container_name: shared_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=platform_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - platform_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: shared_rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=platform
      - RABBITMQ_DEFAULT_PASS=platform123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - platform_network

  redis:
    image: redis:7-alpine
    container_name: shared_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - platform_network

  # API Gateway (placeholder for API Six)
  nginx:
    image: nginx:alpine
    container_name: api_gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - user-management-service
      - workspace-management-service
      - article-management-service
    networks:
      - platform_network

  # Core Services
  user-management-service:
    build:
      context: ./user-management-service
      target: development
    container_name: user-management-service
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=user_management_dev
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=platform
      - RABBITMQ_PASS=platform123
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - rabbitmq
      - redis
    volumes:
      - ./user-management-service:/app
    networks:
      - platform_network

  workspace-management-service:
    build:
      context: ./workspace-management-service
      target: development
    container_name: workspace-management-service
    ports:
      - "5002:5002"
    environment:
      - FLASK_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=workspace_management_dev
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=platform
      - RABBITMQ_PASS=platform123
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - postgres
      - rabbitmq
      - redis
    volumes:
      - ./workspace-management-service:/app
    networks:
      - platform_network

  article-management-service:
    build:
      context: ./article-management-service
      target: development
    container_name: article-management-service
    ports:
      - "5003:5003"
    environment:
      - FLASK_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=article_management_dev
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=platform
      - RABBITMQ_PASS=platform123
      - REDIS_URL=redis://redis:6379/2
    depends_on:
      - postgres
      - rabbitmq
      - redis
    volumes:
      - ./article-management-service:/app
    networks:
      - platform_network

  domain-management-service:
    build:
      context: ./domain-management-service
      target: development
    container_name: domain-management-service
    ports:
      - "5004:5004"
    environment:
      - FLASK_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=domain_management_dev
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=platform
      - RABBITMQ_PASS=platform123
      - REDIS_URL=redis://redis:6379/3
    depends_on:
      - postgres
      - rabbitmq
      - redis
    volumes:
      - ./domain-management-service:/app
    networks:
      - platform_network

  ai-configuration-service:
    build:
      context: ./ai-configuration-service
      target: development
    container_name: ai-configuration-service
    ports:
      - "5005:5005"
    environment:
      - FLASK_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=ai_configuration_dev
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=platform
      - RABBITMQ_PASS=platform123
      - REDIS_URL=redis://redis:6379/4
    depends_on:
      - postgres
      - rabbitmq
      - redis
    volumes:
      - ./ai-configuration-service:/app
    networks:
      - platform_network

  image-generation-service:
    build:
      context: ./image-generation-service
      target: development
    container_name: image-generation-service
    ports:
      - "5006:5006"
    environment:
      - FLASK_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=image_generation_dev
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=platform
      - RABBITMQ_PASS=platform123
      - REDIS_URL=redis://redis:6379/5
    depends_on:
      - postgres
      - rabbitmq
      - redis
    volumes:
      - ./image-generation-service:/app
    networks:
      - platform_network

  monitoring-service:
    build:
      context: ./monitoring-service
      target: development
    container_name: monitoring-service
    ports:
      - "5007:5007"
    environment:
      - FLASK_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=monitoring_dev
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=platform
      - RABBITMQ_PASS=platform123
      - REDIS_URL=redis://redis:6379/6
    depends_on:
      - postgres
      - rabbitmq
      - redis
    volumes:
      - ./monitoring-service:/app
    networks:
      - platform_network

  notification-service:
    build:
      context: ./notification-service
      target: development
    container_name: notification-service
    ports:
      - "5008:5008"
    environment:
      - FLASK_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=notifications_dev
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=platform
      - RABBITMQ_PASS=platform123
      - REDIS_URL=redis://redis:6379/7
    depends_on:
      - postgres
      - rabbitmq
      - redis
    volumes:
      - ./notification-service:/app
    networks:
      - platform_network

  logging-service:
    build:
      context: ./logging-service
      target: development
    container_name: logging-service
    ports:
      - "5009:5009"
    environment:
      - FLASK_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=logging_dev
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=platform
      - RABBITMQ_PASS=platform123
      - REDIS_URL=redis://redis:6379/8
    depends_on:
      - postgres
      - rabbitmq
      - redis
    volumes:
      - ./logging-service:/app
    networks:
      - platform_network

  configuration-service:
    build:
      context: ./configuration-service
      target: development
    container_name: configuration-service
    ports:
      - "5010:5010"
    environment:
      - FLASK_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=configuration_dev
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=platform
      - RABBITMQ_PASS=platform123
      - REDIS_URL=redis://redis:6379/9
    depends_on:
      - postgres
      - rabbitmq
      - redis
    volumes:
      - ./configuration-service:/app
    networks:
      - platform_network

  scraping-service:
    build:
      context: ./scraping-service
      target: development
    container_name: scraping-service
    ports:
      - "5011:5011"
    environment:
      - FLASK_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=scraping_dev
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=platform
      - RABBITMQ_PASS=platform123
      - REDIS_URL=redis://redis:6379/10
    depends_on:
      - postgres
      - rabbitmq
      - redis
    volumes:
      - ./scraping-service:/app
    networks:
      - platform_network

  ai-rate-limiter-service:
    build:
      context: ./ai-rate-limiter-service
      target: development
    container_name: ai-rate-limiter-service
    ports:
      - "5012:5012"
    environment:
      - FLASK_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=ai_rate_limiter_dev
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=platform
      - RABBITMQ_PASS=platform123
      - REDIS_URL=redis://redis:6379/11
    depends_on:
      - postgres
      - rabbitmq
      - redis
    volumes:
      - ./ai-rate-limiter-service:/app
    networks:
      - platform_network

  # Monitoring and Observability
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - platform_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - platform_network

  # Database Administration
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@platform.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - platform_network

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  prometheus_data:
  grafana_data:
  pgadmin_data:

networks:
  platform_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16