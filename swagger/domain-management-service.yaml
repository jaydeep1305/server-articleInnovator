openapi: 3.0.3
info:
  title: Domain Management Service API
  description: |
    Microservice responsible for domain management and WordPress integration.
    Handles domain configuration, WordPress connection testing, and manages WordPress 
    categories, tags, and authors. Based on exact Django model schemas from apiApp/models.py
  version: 1.0.0
  contact:
    name: Development Team
    email: dev@company.com

servers:
  - url: http://localhost:5003/api/v1
    description: Development server
  - url: https://api.company.com/domain-management/v1
    description: Production server

tags:
  - name: Domains
    description: Domain management operations
  - name: WordPress
    description: WordPress integration operations
  - name: Categories
    description: WordPress category management
  - name: Tags
    description: WordPress tag management
  - name: Authors
    description: WordPress author management

paths:
  /domains:
    get:
      tags:
        - Domains
      summary: List domains
      description: Get paginated list of domains with filtering
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: workspace_id
          in: query
          description: Filter by workspace ID
          schema:
            type: integer
        - name: search
          in: query
          description: Search in domain names
          schema:
            type: string
      responses:
        '200':
          description: Domains retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  domains:
                    type: array
                    items:
                      $ref: '#/components/schemas/Domain'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags:
        - Domains
      summary: Create domain
      description: Add new domain with WordPress configuration
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDomainRequest'
      responses:
        '201':
          description: Domain created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain'
        '400':
          description: Invalid domain data
        '409':
          description: Domain name already exists

  /domains/{domainId}:
    get:
      tags:
        - Domains
      summary: Get domain by ID
      description: Retrieve specific domain details
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Domain retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain'
        '404':
          description: Domain not found

    put:
      tags:
        - Domains
      summary: Update domain
      description: Update domain configuration
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDomainRequest'
      responses:
        '200':
          description: Domain updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain'

    delete:
      tags:
        - Domains
      summary: Delete domain
      description: Remove domain and all associated data
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Domain deleted successfully

  /domains/{domainId}/test-connection:
    post:
      tags:
        - WordPress
      summary: Test WordPress connection
      description: Verify WordPress API connection and credentials
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Connection test successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "WordPress connection successful"
                  wordpress_version:
                    type: string
                    example: "6.4.2"
                  site_url:
                    type: string
                    example: "https://example.com"
        '400':
          description: Connection test failed

  /domains/{domainId}/sync-wp-data:
    post:
      tags:
        - WordPress
      summary: Sync WordPress data
      description: Synchronize categories, tags, and authors from WordPress
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sync_categories:
                  type: boolean
                  default: true
                sync_tags:
                  type: boolean
                  default: true
                sync_authors:
                  type: boolean
                  default: true
      responses:
        '200':
          description: WordPress data synchronized successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories_synced:
                    type: integer
                    example: 15
                  tags_synced:
                    type: integer
                    example: 45
                  authors_synced:
                    type: integer
                    example: 3

  /domains/{domainId}/wp-categories:
    get:
      tags:
        - Categories
      summary: List WordPress categories
      description: Get categories for specific domain
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
        - name: derived_by
          in: query
          description: Filter by creation source
          schema:
            type: string
            enum: [ai, wordpress]
        - name: default_section
          in: query
          description: Filter by default section status
          schema:
            type: boolean
      responses:
        '200':
          description: WordPress categories retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WpCategory'

    post:
      tags:
        - Categories
      summary: Create WordPress category
      description: Create new category in WordPress and local database
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWpCategoryRequest'
      responses:
        '201':
          description: WordPress category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WpCategory'

  /domains/{domainId}/wp-categories/{categoryId}:
    get:
      tags:
        - Categories
      summary: Get WordPress category
      description: Retrieve specific WordPress category
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: WordPress category retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WpCategory'

    put:
      tags:
        - Categories
      summary: Update WordPress category
      description: Update category in WordPress and local database
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWpCategoryRequest'
      responses:
        '200':
          description: WordPress category updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WpCategory'

    delete:
      tags:
        - Categories
      summary: Delete WordPress category
      description: Remove category from WordPress and local database
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: WordPress category deleted successfully

  /domains/{domainId}/wp-tags:
    get:
      tags:
        - Tags
      summary: List WordPress tags
      description: Get tags for specific domain
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
        - name: derived_by
          in: query
          description: Filter by creation source
          schema:
            type: string
            enum: [ai, wordpress]
      responses:
        '200':
          description: WordPress tags retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WpTag'

    post:
      tags:
        - Tags
      summary: Create WordPress tag
      description: Create new tag in WordPress and local database
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWpTagRequest'
      responses:
        '201':
          description: WordPress tag created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WpTag'

  /domains/{domainId}/wp-tags/{tagId}:
    put:
      tags:
        - Tags
      summary: Update WordPress tag
      description: Update tag in WordPress and local database
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
        - name: tagId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWpTagRequest'
      responses:
        '200':
          description: WordPress tag updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WpTag'

    delete:
      tags:
        - Tags
      summary: Delete WordPress tag
      description: Remove tag from WordPress and local database
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
        - name: tagId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: WordPress tag deleted successfully

  /domains/{domainId}/wp-authors:
    get:
      tags:
        - Authors
      summary: List WordPress authors
      description: Get authors for specific domain
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
        - name: derived_by
          in: query
          description: Filter by creation source
          schema:
            type: string
            enum: [ai, wordpress]
        - name: default_section
          in: query
          description: Filter by default section status
          schema:
            type: boolean
      responses:
        '200':
          description: WordPress authors retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WpAuthor'

    post:
      tags:
        - Authors
      summary: Create WordPress author
      description: Create new author in WordPress and local database
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWpAuthorRequest'
      responses:
        '201':
          description: WordPress author created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WpAuthor'

  /domains/{domainId}/wp-authors/{authorId}:
    get:
      tags:
        - Authors
      summary: Get WordPress author
      description: Retrieve specific WordPress author
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: WordPress author retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WpAuthor'

    put:
      tags:
        - Authors
      summary: Update WordPress author
      description: Update author in WordPress and local database
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWpAuthorRequest'
      responses:
        '200':
          description: WordPress author updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WpAuthor'

    delete:
      tags:
        - Authors
      summary: Delete WordPress author
      description: Remove author from WordPress and local database
      security:
        - bearerAuth: []
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: WordPress author deleted successfully

components:
  schemas:
    Domain:
      type: object
      description: "domain model from apiApp/models.py"
      properties:
        id:
          type: integer
          example: 1
        manager_id:
          type: array
          items:
            type: integer
          example: [1, 2]
          description: "ManyToManyField with user_detail, related_name='domain_manager'"
        writer_id:
          type: array
          items:
            type: integer
          example: [3, 4, 5]
          description: "ManyToManyField with user_detail, related_name='domain_writer'"
        name:
          type: string
          maxLength: 200
          example: "example.com"
          description: "Unique domain name"
        wordpress_username:
          type: string
          maxLength: 200
          example: "admin"
        wordpress_application_password:
          type: string
          maxLength: 200
          example: "xxxx xxxx xxxx xxxx"
          description: "WordPress application password"
        permalinks:
          type: string
          maxLength: 200
          example: "/%postname%/"
          default: ""
        slug_id:
          type: string
          maxLength: 100
          example: "a1b2c3d4-e5f6-7g8h-9i0j-k1l2m3n4o5p6"
          description: "Auto-generated UUID"
          default: ""
        created_date:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updated_date:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        workspace_id:
          type: integer
          example: 1
          description: "ForeignKey to workspace model"
          nullable: true
        created_by:
          type: integer
          example: 1
          description: "ForeignKey to User model"
          nullable: true

    CreateDomainRequest:
      type: object
      required:
        - name
        - wordpress_username
        - wordpress_application_password
        - workspace_id
      properties:
        name:
          type: string
          maxLength: 200
          example: "newsite.com"
        wordpress_username:
          type: string
          maxLength: 200
          example: "admin"
        wordpress_application_password:
          type: string
          maxLength: 200
          example: "xxxx xxxx xxxx xxxx"
        permalinks:
          type: string
          maxLength: 200
          example: "/%postname%/"
        workspace_id:
          type: integer
          example: 1
        manager_ids:
          type: array
          items:
            type: integer
          example: [1, 2]
        writer_ids:
          type: array
          items:
            type: integer
          example: [3, 4]

    UpdateDomainRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        wordpress_username:
          type: string
          maxLength: 200
        wordpress_application_password:
          type: string
          maxLength: 200
        permalinks:
          type: string
          maxLength: 200
        manager_ids:
          type: array
          items:
            type: integer
        writer_ids:
          type: array
          items:
            type: integer

    WpCategory:
      type: object
      description: "wp_category model from apiApp/models.py"
      properties:
        id:
          type: integer
          example: 1
        domain_id:
          type: integer
          example: 1
          description: "ForeignKey to domain model"
        name:
          type: string
          maxLength: 200
          example: "Technology"
          default: ""
        slug:
          type: string
          maxLength: 200
          example: "technology"
          default: ""
        description:
          type: string
          maxLength: 1000
          example: "Technology related articles"
          default: ""
        wp_cat_id:
          type: string
          maxLength: 200
          example: "5"
          description: "WordPress category ID"
          default: ""
        workspace_id:
          type: integer
          example: 1
          description: "ForeignKey to workspace model"
        slug_id:
          type: string
          maxLength: 100
          example: "a1b2c3d4-e5f6-7g8h-9i0j-k1l2m3n4o5p6"
          description: "Auto-generated UUID"
          default: ""
        created_date:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updated_date:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        created_by:
          type: integer
          example: 1
          description: "ForeignKey to User model"
          nullable: true
        derived_by:
          type: string
          enum: [ai, wordpress]
          example: "wordpress"
          description: "Source of category creation"
          nullable: true
        default_section:
          type: boolean
          example: false
          default: false
          description: "Only one default_section=True per domain"

    CreateWpCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 200
          example: "New Category"
        slug:
          type: string
          maxLength: 200
          example: "new-category"
        description:
          type: string
          maxLength: 1000
          example: "Description for new category"
        default_section:
          type: boolean
          default: false

    UpdateWpCategoryRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        slug:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        default_section:
          type: boolean

    WpTag:
      type: object
      description: "wp_tag model from apiApp/models.py"
      properties:
        id:
          type: integer
          example: 1
        domain_id:
          type: integer
          example: 1
          description: "ForeignKey to domain model"
        name:
          type: string
          maxLength: 200
          example: "SEO"
          default: ""
        slug:
          type: string
          maxLength: 200
          example: "seo"
          default: ""
        description:
          type: string
          maxLength: 1000
          example: "Search Engine Optimization"
          default: ""
        wp_tag_id:
          type: string
          maxLength: 200
          example: "12"
          description: "WordPress tag ID"
          default: ""
        workspace_id:
          type: integer
          example: 1
          description: "ForeignKey to workspace model"
          nullable: true
        slug_id:
          type: string
          maxLength: 100
          example: "a1b2c3d4-e5f6-7g8h-9i0j-k1l2m3n4o5p6"
          description: "Auto-generated UUID"
          default: ""
        created_date:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updated_date:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        created_by:
          type: integer
          example: 1
          description: "ForeignKey to User model"
          nullable: true
        derived_by:
          type: string
          enum: [ai, wordpress]
          example: "ai"
          description: "Source of tag creation"
          nullable: true

    CreateWpTagRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 200
          example: "New Tag"
        slug:
          type: string
          maxLength: 200
          example: "new-tag"
        description:
          type: string
          maxLength: 1000
          example: "Description for new tag"

    UpdateWpTagRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        slug:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 1000

    WpAuthor:
      type: object
      description: "wp_author model from apiApp/models.py"
      properties:
        id:
          type: integer
          example: 1
        domain_id:
          type: integer
          example: 1
          description: "ForeignKey to domain model"
        username:
          type: string
          maxLength: 200
          example: "john_author"
          default: ""
        author_password:
          type: string
          maxLength: 200
          example: "secure_password"
          default: ""
        first_name:
          type: string
          maxLength: 200
          example: "John"
          default: ""
        last_name:
          type: string
          maxLength: 200
          example: "Doe"
          default: ""
        email:
          type: string
          maxLength: 200
          example: "john@example.com"
          default: ""
        bio:
          type: string
          maxLength: 200
          example: "Experienced content writer"
          default: ""
        wp_author_id:
          type: string
          maxLength: 200
          example: "3"
          description: "WordPress author ID"
          default: ""
        workspace_id:
          type: integer
          example: 1
          description: "ForeignKey to workspace model"
          nullable: true
        slug_id:
          type: string
          maxLength: 100
          example: "a1b2c3d4-e5f6-7g8h-9i0j-k1l2m3n4o5p6"
          description: "Auto-generated UUID"
          default: ""
        created_date:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updated_date:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        profile_image:
          type: string
          example: "wp_author/profile.jpg"
          description: "ImageField upload_to='wp_author'"
          default: ""
        created_by:
          type: integer
          example: 1
          description: "ForeignKey to User model"
          nullable: true
        derived_by:
          type: string
          enum: [ai, wordpress]
          example: "wordpress"
          description: "Source of author creation"
          nullable: true
        default_section:
          type: boolean
          example: false
          default: false
          description: "Only one default_section=True per domain"

    CreateWpAuthorRequest:
      type: object
      required:
        - username
        - email
      properties:
        username:
          type: string
          maxLength: 200
          example: "new_author"
        author_password:
          type: string
          maxLength: 200
          example: "secure_password"
        first_name:
          type: string
          maxLength: 200
          example: "Jane"
        last_name:
          type: string
          maxLength: 200
          example: "Smith"
        email:
          type: string
          maxLength: 200
          example: "jane@example.com"
        bio:
          type: string
          maxLength: 200
          example: "Professional content creator"
        profile_image:
          type: string
          format: uri
          example: "https://example.com/profile.jpg"
        default_section:
          type: boolean
          default: false

    UpdateWpAuthorRequest:
      type: object
      properties:
        username:
          type: string
          maxLength: 200
        author_password:
          type: string
          maxLength: 200
        first_name:
          type: string
          maxLength: 200
        last_name:
          type: string
          maxLength: 200
        email:
          type: string
          maxLength: 200
        bio:
          type: string
          maxLength: 200
        profile_image:
          type: string
          format: uri
        default_section:
          type: boolean

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        pages:
          type: integer
          example: 5

    Error:
      type: object
      properties:
        error:
          type: string
          example: "ValidationError"
        message:
