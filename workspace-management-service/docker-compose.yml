version: '3.8'

services:
  workspace-management-service:
    build:
      context: .
      target: development
    container_name: workspace-management-service
    ports:
      - "5002:5002"
    environment:
      - FLASK_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=workspace_management_dev
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - postgres
      - rabbitmq
      - redis
    volumes:
      - .:/app
    networks:
      - workspace_network

  postgres:
    image: postgres:15-alpine
    container_name: workspace_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=workspace_management_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - workspace_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: workspace_rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - workspace_network

  redis:
    image: redis:7-alpine
    container_name: workspace_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - workspace_network

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:

networks:
  workspace_network:
    driver: bridge
